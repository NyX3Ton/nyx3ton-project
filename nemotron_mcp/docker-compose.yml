services:
  mcp-mssql:
    image: python:3.12-slim-bookworm
    container_name: mcp-mssql
    environment:
      SQL_HOST: ${SQL_HOST}
      SQL_PORT: ${SQL_PORT:-1433}
      SQL_DATABASE: ${SQL_DATABASE}
      SQL_USER: ${SQL_USER}
      SQL_PASSWORD: ${SQL_PASSWORD}
      MSSQL_ENCRYPT: "false"                # or "true" with proper certs
      MSSQL_TRUST_SERVER_CERT: "true"       # if you’re using self-signed certs
      MSSQL_ODBC_DRIVER: "ODBC Driver 18 for SQL Server"
      LOG_LEVEL: "DEBUG"
    ports:
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "command -v ss >/dev/null 2>&1 && ss -ln | grep -q ':5173'"]
      interval: 30s
      timeout: 10s
      retries: 10
    command: >
      bash -lc "
        set -e;
        apt-get update -y &&
        apt-get install -y --no-install-recommends curl gnupg apt-transport-https unixodbc unixodbc-dev ca-certificates iproute2 &&
        curl -sSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /usr/share/keyrings/microsoft-prod.gpg &&
        echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/debian/12/prod bookworm main' > /etc/apt/sources.list.d/microsoft-prod.list &&
        apt-get update -y &&
        ACCEPT_EULA=Y apt-get install -y msodbcsql18 &&
        pip install --no-cache-dir --upgrade pip &&
        pip install --no-cache-dir mssql-mcp-server &&
        exec python -m mssql_mcp_server.server
      "
  vllm-nemotron:
    image: vllm/vllm-openai:latest
    container_name: vllm-nemotron
    runtime: nvidia
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - "C:\\Users\\nyx3t\\.cache\\huggingface:/root/.cache/huggingface"
    ports:
      - "8000:8000"     # -> http://localhost:8000/v1
    command: >
      --model weathermanj/nemotron-nano-9b-fp8
      --trust-remote-code
      --quantization fp8
      --dtype float16
      --max-model-len 2048
      --kv-cache-dtype fp8_e5m2
      --gpu-memory-utilization 0.96
      --max-num-seqs 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -sf http://localhost:8000/v1/models >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20

